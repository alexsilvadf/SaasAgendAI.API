services:
  - type: web
    name: agend-ai-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Data__UseInMemory
        value: "true"
      # Opcional no modo in-memory: app usa fallback se vazio. Obrigatório com SQL Server.
      - key: Jwt__Secret
        generateValue: true
      - key: Jwt__Issuer
        value: AgendAI
      - key: Jwt__Audience
        value: AgendAI.App
      - key: Cors__AllowedOrigins__0
        value: https://agendai-fawn.vercel.app
      - key: Cors__AllowedOrigins__1
        value: http://localhost:4200
